<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard · AI Resume Analyzer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;650;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<nav class="navbar">
  <div class="brand"><span class="brand-mark">AI</span><span>Dashboard</span></div>
  <div class="nav-links">
    <span id="navUser" class="nav-pill" style="display:none;"></span>
    <a href="index.html">Analyze</a>
    <a href="login.html" id="navLogin">Login</a>
    <a href="#" id="navLogout" style="display:none;" onclick="logout()">Logout</a>
  </div>
</nav>

<main class="page-shell">
  <div class="page-heading">
    <h1>Your analyses</h1>
    <p>Track resume scores, rankings, and downloadable reports.</p>
  </div>

  <div id="loginNotice" class="notice" style="display:none;">
    <a href="login.html">Login</a> to save your analyses across devices. Public analyses are shown below.
  </div>

  <div class="stats-row" id="statsRow"></div>
  <div id="historyList"></div>

  <div class="chart-box" id="chartBox" style="display:none;">
    <h3>Score Distribution</h3>
    <canvas id="rankChart" height="120"></canvas>
  </div>
</main>

<footer>© 2026 Sagnik Dam | AI Resume Analyzer</footer>
<script src="auth.js"></script>
<script>
  updateNav();
  if (!isLoggedIn()) document.getElementById("loginNotice").style.display = "block";

  async function loadHistory() {
    const headers = {};
    if (isLoggedIn()) headers["Authorization"] = `Bearer ${getToken()}`;

    try {
      const res = await fetch(`${API}/api/history`, { headers });
      const data = await res.json();
      renderStats(data);
      renderList(data);
      renderChart(data);
    } catch (e) {
      document.getElementById("historyList").innerHTML =
        `<div class="empty">Could not load history. Is the server running?</div>`;
    }
  }

  function escapeHtml(value) {
    return String(value ?? "").replace(/[&<>'"]/g, ch => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", "'": "&#39;", '"': "&quot;"
    }[ch]));
  }

  function scoreClass(s) {
    if (s >= 70) return "hi";
    if (s >= 50) return "mi";
    return "lo";
  }

  function renderStats(data) {
    const row = document.getElementById("statsRow");
    if (!data.length) {
      row.innerHTML = "";
      return;
    }
    const scores = data.map(d => Number(d.score) || 0);
    const avg = Math.round(scores.reduce((a,b) => a + b, 0) / scores.length);
    const best = Math.max(...scores);
    row.innerHTML = `
      <div class="stat-card"><div class="val">${data.length}</div><div class="lbl">Analyses</div></div>
      <div class="stat-card"><div class="val">${avg}%</div><div class="lbl">Avg Score</div></div>
      <div class="stat-card"><div class="val">${best}%</div><div class="lbl">Best Score</div></div>
    `;
  }

  function renderList(data) {
    const el = document.getElementById("historyList");
    if (!data.length) {
      el.innerHTML = `<div class="empty">No analyses yet. <a href="index.html" style="color:#99f6e4;font-weight:800;">Analyze a resume</a></div>`;
      return;
    }
    el.innerHTML = data.map(d => {
      const date = d.date ? d.date.slice(0,16).replace("T", " ") : "";
      return `
        <div class="history-item">
          <div class="h-score ${scoreClass(Number(d.score) || 0)}">${escapeHtml(d.score)}</div>
          <div class="h-info">
            <h4>${escapeHtml(d.name)}</h4>
            <p>${escapeHtml(date)} &nbsp;·&nbsp; <span class="rank-badge">${escapeHtml(d.rank)}</span></p>
            ${d.job_description ? `<p style="color:#99f6e4;margin-top:3px;">Custom job description</p>` : ""}
          </div>
          <div class="h-actions">
            <button class="dl-btn" onclick="downloadReport(${Number(d.id)})">PDF Report</button>
          </div>
        </div>
      `;
    }).join("");
  }

  function renderChart(data) {
    if (!data.length) return;
    document.getElementById("chartBox").style.display = "block";
    const ranks = { Elite: 0, Gold: 0, Silver: 0, Bronze: 0 };
    data.forEach(d => {
      const rank = String(d.rank || "");
      if (rank.includes("Elite")) ranks.Elite++;
      else if (rank.includes("Gold")) ranks.Gold++;
      else if (rank.includes("Silver")) ranks.Silver++;
      else ranks.Bronze++;
    });
    new Chart(document.getElementById("rankChart"), {
      type: "bar",
      data: {
        labels: Object.keys(ranks),
        datasets: [{
          label: "Resumes",
          data: Object.values(ranks),
          backgroundColor: ["#4f46e5", "#14b8a6", "#f59e0b", "#ef4444"],
          borderRadius: 8,
        }]
      },
      options: {
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { color: "#94a3b8" }, grid: { color: "rgba(255,255,255,0.05)" } },
          y: { ticks: { color: "#94a3b8", stepSize: 1 }, grid: { color: "rgba(255,255,255,0.05)" } }
        }
      }
    });
  }

  async function downloadReport(id) {
    const token = getToken();
    const url = `${API}/api/report/${id}${token ? "?token=" + token : ""}`;
    try {
      const res = await fetch(url);
      if (!res.ok) { alert("Could not generate PDF."); return; }
      const blob = await res.blob();
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = `resume_report_${id}.pdf`;
      link.click();
    } catch (e) {
      alert("PDF download failed: " + e.message);
    }
  }

  loadHistory();
</script>
</body>
</html>
