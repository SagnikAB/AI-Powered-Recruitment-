<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Resume Analyzer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO -->
  <meta name="description" content="Analyze your resume with AI. Get ATS score, ranking, and smart recommendations instantly.">

  <!-- CSS -->
  <link rel="stylesheet" href="./style.css">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- ================= NAVBAR ================= -->
<nav class="navbar">
  <h2>🤖 AI Resume Analyzer</h2>
  <a href="history.html">Dashboard</a>
</nav>

<!-- ================= HERO ================= -->
<section class="hero">
  <h1>Analyze Your Resume with AI</h1>
  <p>Get ATS score, ranking & smart insights instantly 🚀</p>
</section>

<!-- ================= MAIN ================= -->
<main class="container">
  <div class="card">

    <h2>📄 Upload Resume</h2>

    <!-- DROP ZONE -->
    <div id="dropZone" class="drop-zone" tabindex="0">
      <p>📂 Drag & Drop Resume</p>
      <span>or click to upload</span>
    </div>

    <!-- FILE INPUT -->
    <input 
      type="file" 
      id="resumeInput" 
      accept=".pdf,.doc,.docx"
      hidden
    >

    <!-- BUTTON -->
    <button id="analyzeBtn">Analyze Resume</button>

    <!-- LOADING -->
    <p id="loading" class="loading" style="display:none;">
      ⏳ Analyzing your resume...
    </p>

    <!-- RESULT -->
    <div id="result" class="result"></div>

  </div>
</main>

<!-- ================= FOOTER ================= -->
<footer>
  © 2026 Sagnik Dam | AI Resume Analyzer
</footer>

<!-- ================= SCRIPT ================= -->
<script src="./app.js"></script>

</body>
</html>
