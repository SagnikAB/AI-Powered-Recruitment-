<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register · AI Resume Analyzer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;650;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <nav class="navbar">
    <div class="brand"><span class="brand-mark">AI</span><span>Resume Analyzer</span></div>
    <div class="nav-links"><a href="index.html">Home</a></div>
  </nav>

  <div class="auth-wrap">
    <div class="auth-card">
      <h1>Create account</h1>
      <p class="sub">Save analyses, reports, and interview progress.</p>
      <div class="err-msg" id="errMsg"></div>
      <div class="ok-msg" id="okMsg"></div>

      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="sagnik123" autocomplete="username"/>
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
      </div>
      <div class="field">
        <label for="password">Password <span class="subtle">min 6 chars</span></label>
        <input type="password" id="password" placeholder="Create a password" autocomplete="new-password"/>
      </div>
      <div class="field">
        <label for="confirm">Confirm password</label>
        <input type="password" id="confirm" placeholder="Repeat your password" autocomplete="new-password"/>
      </div>

      <button id="regBtn" type="button">Create Account</button>
      <div class="auth-link">Already have an account? <a href="login.html">Login</a></div>
    </div>
  </div>

  <script src="auth.js"></script>
  <script>
    if (isLoggedIn()) window.location.href = "index.html";

    document.getElementById("regBtn").onclick = async () => {
      const username = document.getElementById("username").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const confirm = document.getElementById("confirm").value.trim();
      const errMsg = document.getElementById("errMsg");
      const okMsg = document.getElementById("okMsg");
      const btn = document.getElementById("regBtn");

      errMsg.style.display = "none";
      okMsg.style.display = "none";

      if (!username || !email || !password || !confirm) {
        errMsg.textContent = "Please fill in all fields.";
        errMsg.style.display = "block";
        return;
      }
      if (password !== confirm) {
        errMsg.textContent = "Passwords do not match.";
        errMsg.style.display = "block";
        return;
      }
      if (password.length < 6) {
        errMsg.textContent = "Password must be at least 6 characters.";
        errMsg.style.display = "block";
        return;
      }

      btn.disabled = true;
      btn.textContent = "Creating account...";
      try {
        const res = await fetch(`${API}/api/auth/register`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, email, password })
        });
        const data = await res.json();
        if (!res.ok) {
          errMsg.textContent = data.error || "Registration failed.";
          errMsg.style.display = "block";
          return;
        }
        okMsg.textContent = "Account created. Redirecting to login...";
        okMsg.style.display = "block";
        setTimeout(() => window.location.href = "login.html", 1500);
      } catch (e) {
        errMsg.textContent = "Cannot connect to server.";
        errMsg.style.display = "block";
      } finally {
        btn.disabled = false;
        btn.textContent = "Create Account";
      }
    };
  </script>
</body>
</html>
