<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login · AI Resume Analyzer</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .auth-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .auth-card {
      background: rgba(30,41,59,0.7);
      backdrop-filter: blur(20px);
      border: 1px solid #1f2937;
      border-radius: 20px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
    }
    .auth-card h1 {
      font-size: 1.6rem;
      text-align: center;
      margin-bottom: 0.4rem;
    }
    .auth-card p.sub {
      text-align: center;
      color: #9ca3af;
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }
    .field { margin-bottom: 1.1rem; }
    .field label {
      display: block;
      font-size: 0.85rem;
      color: #d1d5db;
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: #0f172a;
      border: 1px solid #374151;
      border-radius: 10px;
      color: #e5e7eb;
      font-size: 0.95rem;
      outline: none;
      transition: border 0.2s;
    }
    .field input:focus { border-color: #6366f1; }
    .err-msg {
      background: rgba(239,68,68,0.12);
      border: 1px solid #ef4444;
      color: #ef4444;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.88rem;
      margin-bottom: 1rem;
      display: none;
    }
    .auth-link {
      text-align: center;
      margin-top: 1.25rem;
      font-size: 0.88rem;
      color: #9ca3af;
    }
    .auth-link a { color: #a5b4fc; text-decoration: none; }
    .auth-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <nav class="navbar">
    <h2>🤖 AI Resume Analyzer</h2>
    <a href="index.html">Home</a>
  </nav>

  <div class="auth-wrap">
    <div class="auth-card">
      <h1>Welcome back 👋</h1>
      <p class="sub">Login to access your analysis history</p>

      <div class="err-msg" id="errMsg"></div>

      <div class="field">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••"/>
      </div>

      <button id="loginBtn">Login</button>

      <div class="auth-link">
        Don't have an account? <a href="register.html">Register</a>
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
  <script>
    // Redirect if already logged in
    if (isLoggedIn()) window.location.href = "index.html";

    document.getElementById("loginBtn").onclick = async () => {
      const email    = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const errMsg   = document.getElementById("errMsg");
      const btn      = document.getElementById("loginBtn");

      errMsg.style.display = "none";

      if (!email || !password) {
        errMsg.textContent   = "Please fill in all fields.";
        errMsg.style.display = "block";
        return;
      }

      btn.disabled    = true;
      btn.textContent = "Logging in...";

      try {
        const res  = await fetch(`${API}/api/auth/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (!res.ok) {
          errMsg.textContent   = data.error || "Login failed.";
          errMsg.style.display = "block";
          return;
        }

        saveSession(data.token, data.username);
        window.location.href = "index.html";

      } catch (e) {
        errMsg.textContent   = "Cannot connect to server.";
        errMsg.style.display = "block";
      } finally {
        btn.disabled    = false;
        btn.textContent = "Login";
      }
    };

    // Allow Enter key
    document.addEventListener("keydown", e => {
      if (e.key === "Enter") document.getElementById("loginBtn").click();
    });
  </script>
</body>
</html>
