<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login · AI Resume Analyzer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;650;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <nav class="navbar">
    <div class="brand"><span class="brand-mark">AI</span><span>Resume Analyzer</span></div>
    <div class="nav-links"><a href="index.html">Home</a></div>
  </nav>

  <div class="auth-wrap">
    <div class="auth-card">
      <h1>Welcome back</h1>
      <p class="sub">Login to access saved analyses and reports.</p>
      <div class="err-msg" id="errMsg"></div>

      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password"/>
      </div>

      <button id="loginBtn" type="button">Login</button>
      <div class="auth-link">Don't have an account? <a href="register.html">Register</a></div>
    </div>
  </div>

  <script src="auth.js"></script>
  <script>
    if (isLoggedIn()) window.location.href = "index.html";

    document.getElementById("loginBtn").onclick = async () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const errMsg = document.getElementById("errMsg");
      const btn = document.getElementById("loginBtn");

      errMsg.style.display = "none";
      if (!email || !password) {
        errMsg.textContent = "Please fill in all fields.";
        errMsg.style.display = "block";
        return;
      }

      btn.disabled = true;
      btn.textContent = "Logging in...";
      try {
        const res = await fetch(`${API}/api/auth/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) {
          errMsg.textContent = data.error || "Login failed.";
          errMsg.style.display = "block";
          return;
        }
        saveSession(data.token, data.username);
        window.location.href = "index.html";
      } catch (e) {
        errMsg.textContent = "Cannot connect to server.";
        errMsg.style.display = "block";
      } finally {
        btn.disabled = false;
        btn.textContent = "Login";
      }
    };

    document.addEventListener("keydown", e => {
      if (e.key === "Enter") document.getElementById("loginBtn").click();
    });
  </script>
</body>
</html>
